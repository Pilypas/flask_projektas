{% extends "layout.html" %}


{% block title %}Komentarų puslapis puslapis{% endblock %}

{% block turinys %}
<h2>Komentarai</h2>

<!--Sėkmės pranešimas po sėkmingo komentaro išsaugojimo-->
{% if sekme %}
<div class="success">
    <h3>Ačiū! Jūsų komentaras išsaugotas.</h3>
</div>
{% endif %}

<p>Čia yra Flask aplikacijos komentarų puslapis</p>

<form method="post" action="{{ url_for('komentarai') }}">
    <label for="vardas">Vardas</label>
    <input type="text" id="vardas" name="vardas" required>

    <label for="elpastas">El. paštas</label>
    <input type="email" id="elpastas" name="elpastas" required>

    <label for="zinute">Komentaras:</label>
    <textarea id="zinute" name="zinute" rows="5" required></textarea>

    <button type="submit">Komentuoti</button>
</form>


{% endblock %}
