<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Flask aplikacija{% endblock %}</title>

  <!-- CSS failas iš static/ katalogo – naudojame url_for() -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <h1>
      <a href="{{ url_for('index') }}">Mano Flask svetainė</a>
    </h1>

    <nav>
      <ul>
        <li><a href="{{ url_for('index') }}">Pagrindinis</a></li>
        <li><a href="{{ url_for('kontaktai') }}">Kontaktai</a></li>
        <li><a href="{{ url_for('komentarai') }}">Komentarai</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <footer>
    <p>&copy; 2025 Flask projektas. Sukurta mokymosi tikslais.</p>
  </footer>

  <!-- JavaScript failas iš static/ katalogo -->
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
