{% extends "layout.html" %}

{% block title %}Įvesti paslaugą{% endblock %}

{% block turinys %}
<h2>Įvesti naują paslaugą</h2>

{% if sekme %}
<div class="success">
    Paslauga sėkmingai išsaugota.
</div>
{% endif %}

{% if klaida %}
<div class="error">
    {{ klaida }}
</div>
{% endif %}

<form method="post">
    <label for="pavadinimas">Paslaugos pavadinimas</label>
    <input type="text" id="pavadinimas" name="pavadinimas" required>

    <label for="kategorija">Kategorija</label>
    <input type="text" id="kategorija" name="kategorija" required>

    <label for="trukme_min">Trukmė minutėmis</label>
    <input type="number" id="trukme_min" name="trukme_min" min="1" required>

    <label for="kaina">Kaina (€)</label>
    <input type="number" id="kaina" name="kaina" min="0" step="0.01" required>

    <label class="checkbox-eilute">
        <input type="checkbox" name="aktyvi" checked>
        Paslauga aktyvi
    </label>

    <label for="aprasymas">Aprašymas</label>
    <textarea id="aprasymas" name="aprasymas" rows="5"></textarea>

    <button type="submit">Išsaugoti paslaugą</button>
</form>
{% endblock %}
