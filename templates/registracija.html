{% extends "layout.html" %}

{% block title %}Registracijos puslapis{% endblock %}

{% block turinys %}
<h2>Registracija</h2>


{% if klaida %}
  <div class="error">{{ klaida }}</div>
{% endif %}

{% if sekme %}
  <div class="success">Registracija sėkminga. Dabar galite prisijungti.</div>
{% endif %}

<form method="post">
    <label for="vardas">Vardas</label>
    <input type="text" id="vardas" name="vardas" required>

    <label for="elpastas">El. paštas</label>
    <input type="email" id="elpastas" name="elpastas" required>

    <label for="password">Slaptažodis</label>
    <input type="password" id="slaptazodis" name="slaptazodis" required>

    <button type="submit">Registruotis</button>

</form>


{% endblock %}
